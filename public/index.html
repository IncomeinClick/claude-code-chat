<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2b2b2b">
<title>Claude Code Chat</title>
<style>
:root {
  --bg-primary: #2b2b2b;
  --bg-secondary: #343434;
  --bg-tertiary: #3d3d3d;
  --bg-input: #3d3d3d;
  --text-primary: #ececec;
  --text-secondary: #a8a8a8;
  --text-muted: #737373;
  --accent: #da7756;
  --accent-hover: #e8956e;
  --border: #424242;
  --user-bg: #343434;
  --assistant-bg: #2b2b2b;
  --success: #4ade80;
  --warning: #e3a765;
  --code-bg: #1e1e1e;
  --scrollbar: #424242;
  --scrollbar-hover: #525252;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100dvh;
  overflow: hidden;
}

/* Login Screen */
.login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100dvh;
  padding: 20px;
}

.login-box {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 380px;
}

.login-box h1 {
  font-size: 24px;
  margin-bottom: 8px;
  color: var(--accent);
}

.login-box p {
  color: var(--text-secondary);
  margin-bottom: 24px;
  font-size: 14px;
}

.login-box input {
  width: 100%;
  padding: 12px 16px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-size: 16px;
  margin-bottom: 12px;
  outline: none;
}

.login-box input:focus { border-color: var(--accent); }

.login-box button {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  font-weight: 600;
}

.login-box button:hover { background: var(--accent-hover); }

.login-error {
  color: var(--accent);
  font-size: 13px;
  margin-top: 8px;
  display: none;
}

/* Chat Screen */
.chat-screen {
  display: none;
  flex-direction: column;
  height: 100dvh;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
}

/* Header */
.chat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
  flex-shrink: 0;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-left h2 {
  font-size: 18px;
  color: var(--accent);
}

.session-timer {
  font-size: 12px;
  color: var(--text-muted);
  font-family: monospace;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.header-btn {
  padding: 6px 12px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-secondary);
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
}

.header-btn:hover { background: var(--border); color: var(--text-primary); }
.header-btn.danger { border-color: var(--accent); color: var(--accent); }
.header-btn.danger:hover { background: var(--accent); color: white; }

/* Messages Area */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  scroll-behavior: smooth;
}

.messages::-webkit-scrollbar { width: 6px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
.messages::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

.message {
  max-width: 800px;
  margin: 0 auto 16px;
  padding: 16px 20px;
  border-radius: 12px;
  line-height: 1.6;
  position: relative;
}

.message.user {
  background: var(--user-bg);
  margin-left: 40px;
  border-bottom-right-radius: 4px;
}

.message.assistant {
  background: var(--assistant-bg);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}

.message.system {
  background: transparent;
  color: var(--text-muted);
  font-size: 13px;
  text-align: center;
  padding: 8px;
}

.message-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 6px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.2s;
}

.message:hover .copy-btn { opacity: 1; }
.copy-btn:hover { color: var(--text-primary); }

/* Thinking indicator */
.thinking {
  display: none;
  max-width: 800px;
  margin: 0 auto 16px;
  padding: 12px 20px;
  color: var(--text-muted);
  font-size: 14px;
}

.thinking.active { display: flex; align-items: center; gap: 8px; }

.thinking-dots span {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: bounce 1.4s ease-in-out infinite;
}

.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* Tool use indicator */
.tool-indicator {
  max-width: 800px;
  margin: 4px auto;
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text-muted);
  font-family: monospace;
  word-break: break-all;
}

.tool-indicator .tool-name { color: var(--warning); font-weight: 600; }

/* Input Area */
.input-area {
  padding: 12px 20px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg-secondary);
  flex-shrink: 0;
}

.input-wrapper {
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.input-box {
  flex: 1;
  position: relative;
}

#message-input {
  width: 100%;
  min-height: 44px;
  max-height: 200px;
  padding: 10px 16px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text-primary);
  font-size: 15px;
  font-family: inherit;
  line-height: 1.5;
  resize: none;
  outline: none;
  overflow-y: auto;
}

#message-input:focus { border-color: var(--accent); }
#message-input::placeholder { color: var(--text-muted); }

.input-actions {
  display: flex;
  gap: 4px;
}

.input-btn {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 18px;
  flex-shrink: 0;
}

.input-btn:hover { background: var(--border); color: var(--text-primary); }
.input-btn.send { background: var(--accent); color: white; border-color: var(--accent); }
.input-btn.send:hover { background: var(--accent-hover); }
.input-btn.stop { background: #ef4444; color: white; border-color: #ef4444; display: none; }
.input-btn.stop:hover { background: #dc2626; }

/* File upload */
.file-drop-zone {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(218, 119, 86, 0.1);
  border: 3px dashed var(--accent);
  z-index: 100;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: var(--accent);
}

.file-drop-zone.active { display: flex; }

.file-preview {
  display: none;
  gap: 8px;
  padding: 8px 0;
  flex-wrap: wrap;
}

.file-preview.has-files { display: flex; }

.file-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 12px;
  color: var(--text-secondary);
}

.file-chip .remove {
  cursor: pointer;
  color: var(--accent);
  font-weight: bold;
}

/* Markdown rendering */
.message-content code {
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
  font-family: 'SF Mono', 'Fira Code', monospace;
}

.message-content pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  overflow-x: auto;
  margin: 8px 0;
}

.message-content pre code {
  background: none;
  padding: 0;
  font-size: 13px;
  line-height: 1.5;
}

.message-content p { margin: 4px 0; }
.message-content ul, .message-content ol { margin: 4px 0; padding-left: 24px; }
.message-content h1, .message-content h2, .message-content h3 { margin: 12px 0 6px; }
.message-content a { color: var(--accent); }
.message-content blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  color: var(--text-secondary);
  margin: 8px 0;
}

/* Session list */
.session-item {
  display: block;
  width: 100%;
  padding: 12px 14px;
  background: var(--bg-tertiary);
  border: 2px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-size: 14px;
  cursor: pointer;
  text-align: left;
  margin-bottom: 8px;
  transition: border-color 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.session-item:hover, .session-item:focus {
  border-color: var(--accent);
  background: var(--bg-secondary);
  outline: none;
}

.session-item.selected {
  border-color: var(--accent);
  background: rgba(218, 119, 86, 0.15);
}

.session-item .session-summary {
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  font-size: 14px;
  line-height: 1.4;
}

.session-item .session-time {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

.session-nav-hint {
  display: none;
  color: var(--text-muted);
  font-size: 12px;
  margin-top: 10px;
  text-align: center;
}

/* Reauth banner */
.reauth-banner {
  display: none;
  background: rgba(227, 167, 101, 0.15);
  border: 1px solid var(--warning);
  border-radius: 8px;
  padding: 14px 16px;
  margin: 8px 20px;
  max-width: 800px;
  margin-left: auto;
  margin-right: auto;
  font-size: 14px;
  line-height: 1.6;
}
.reauth-banner.active { display: block; }
.reauth-link {
  color: var(--accent);
  text-decoration: underline;
  word-break: break-all;
  font-size: 13px;
}
.reauth-btn {
  padding: 10px 20px;
  background: var(--warning);
  color: #1e1e1e;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  font-weight: 600;
  margin-top: 8px;
  display: inline-block;
}
.reauth-btn:hover { opacity: 0.9; }

/* Mobile */
@media (max-width: 640px) {
  .message { padding: 12px 14px; }
  .message.user { margin-left: 20px; }
  .chat-header { padding: 10px 14px; }
  .messages { padding: 14px; }
  .input-area { padding: 8px 14px 12px; }
}

#file-input { position: absolute; left: -9999px; opacity: 0; width: 1px; height: 1px; }

/* Compacting indicator */
.compacting-banner {
  display: none;
  max-width: 800px;
  margin: 4px auto;
  padding: 10px 16px;
  background: rgba(227, 167, 101, 0.1);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--warning);
  font-size: 13px;
  text-align: center;
  animation: pulse-opacity 2s ease-in-out infinite;
}
.compacting-banner.active { display: block; }
@keyframes pulse-opacity {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

/* Pasted image preview */
.file-chip img.paste-thumb {
  max-height: 40px;
  max-width: 60px;
  border-radius: 4px;
  object-fit: cover;
}
</style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <h1 id="login-title">Claude Code</h1>
    <p>Chat UI</p>
    <input type="text" id="login-user" placeholder="Username" autocomplete="username">
    <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password">
    <button onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- Session Picker -->
<div class="login-screen" id="session-picker" style="display:none;">
  <div class="login-box" style="text-align:center;max-width:440px;">
    <h1 id="picker-title" style="margin-bottom:16px;">Claude Code</h1>
    <div id="picker-buttons">
      <button onclick="startSession(null)" style="width:100%;padding:14px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-weight:600;margin-bottom:10px;">New Session</button>
      <button id="resume-btn" onclick="showResumeSessions()" style="width:100%;padding:14px;background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border);border-radius:8px;font-size:16px;cursor:pointer;font-weight:600;">Resume Session</button>
    </div>
    <div id="session-list-panel" style="display:none;">
      <button onclick="hideResumeSessions()" style="width:100%;padding:8px;background:none;border:none;color:var(--text-muted);font-size:13px;cursor:pointer;margin-bottom:8px;">← Back</button>
      <div id="session-list" style="max-height:340px;overflow-y:auto;text-align:left;"></div>
      <div id="session-list-loading" style="color:var(--text-muted);font-size:13px;padding:16px;">Loading sessions...</div>
    </div>
  </div>
</div>

<!-- Chat -->
<div class="chat-screen" id="chat-screen">
  <div class="chat-header">
    <div class="header-left">
      <h2 id="header-name">Claude Code</h2>
      <span class="session-timer" id="session-timer"></span>
    </div>
    <div class="header-right">
      <button class="header-btn" onclick="location.reload()" title="Refresh">Refresh</button>
      <button class="header-btn danger" onclick="endSession()">End Session</button>
    </div>
  </div>

  <div class="reauth-banner" id="reauth-banner">
    <div id="reauth-content">
      <strong>Authentication expired.</strong><br>
      <button class="reauth-btn" onclick="startReauth()">Re-authenticate</button>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="compacting-banner" id="compacting-banner">Compacting conversation... this may take a moment</div>

  <div class="thinking" id="thinking">
    <div class="thinking-dots"><span></span><span></span><span></span></div>
    <span id="thinking-text">Thinking...</span>
  </div>

  <form class="input-area" id="chat-form" action="javascript:void(0)">
    <div class="file-preview" id="file-preview"></div>
    <div class="input-wrapper">
      <div class="input-box">
        <textarea id="message-input" placeholder="Send a message..." rows="1" autocomplete="off"></textarea>
      </div>
      <div class="input-actions">
        <button type="button" class="input-btn" onclick="triggerFileUpload()" title="Upload file">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <button type="submit" class="input-btn send" id="send-btn" title="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
        <button type="button" class="input-btn stop" id="stop-btn" onclick="stopResponse()" title="Stop">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        </button>
      </div>
    </div>
  </form>

  <input type="file" id="file-input" multiple accept="image/*,text/*,.pdf,.json,.csv,.log,.js,.py,.html,.css">
</div>

<div class="file-drop-zone" id="file-drop-zone">Drop files here</div>

<script>
let token = localStorage.getItem("tim_token");
let ws = null;
let sessionStart = null;
let timerInterval = null;
let timeoutMs = 1800000;
let lastActivity = Date.now();
let currentMsgEl = null;
let currentMsgId = null;
let attachedFiles = [];
let waiting = false;
let displayName = "Claude Code";
let resumeSessionId = null;
let pendingMessage = null;
let claudeSessionId = localStorage.getItem("tim_claude_session") || null;
let initReceived = false;
let reconnectAttempts = 0;
let reconnectTimer = null;
let intentionalClose = false;
let serverSessionId = null; // the session ID on the server side

// Fetch display name from server
fetch("/api/config").then(r => r.json()).then(c => {
  displayName = c.displayName || "Claude Code";
  document.title = displayName + " Chat";
  document.getElementById("login-title").textContent = displayName;
  document.getElementById("header-name").textContent = displayName;
  document.getElementById("thinking-text").textContent = displayName + " is thinking...";
  document.getElementById("picker-title").textContent = displayName;
}).catch(() => {});

function renderMarkdown(text) {
  return text
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code class="lang-$1">$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/\n/g, '<br>');
}

async function doLogin() {
  const user = document.getElementById("login-user").value;
  const pass = document.getElementById("login-pass").value;
  const errEl = document.getElementById("login-error");
  errEl.style.display = "none";
  try {
    const res = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: user, password: pass }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    token = data.token;
    localStorage.setItem("tim_token", token);
    showChat();
  } catch (e) {
    errEl.textContent = e.message || "Login failed";
    errEl.style.display = "block";
  }
}

function logout() {
  token = null;
  localStorage.removeItem("tim_token");
  location.reload();
}

function connectWS(reattachId) {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  const resumeParam = resumeSessionId ? `&resume=${encodeURIComponent(resumeSessionId)}` : "";
  const reattachParam = reattachId ? `&reattach=${encodeURIComponent(reattachId)}` : "";
  initReceived = false;
  ws = new WebSocket(`${proto}//${location.host}/ws?token=${token}${resumeParam}${reattachParam}`);
  ws.onopen = () => {
    // Send pending message immediately — server spawns Claude on first chat msg
    if (pendingMessage) {
      const msg = pendingMessage;
      pendingMessage = null;
      ws.send(JSON.stringify({ type: "chat", content: msg }));
    }
  };
  ws.onmessage = (e) => handleWSMessage(JSON.parse(e.data));
  ws.onclose = (e) => {
    reconnecting = false;
    if (e.code === 4001) { logout(); return; }
    if (e.code === 4002) { location.reload(); return; }
    if (e.code === 1000 || intentionalClose) { intentionalClose = false; serverSessionId = null; return; }
    // Connection lost — reset UI and auto-reconnect with retry
    setWaiting(false);
    addSystemMessage("Connection lost — reconnecting...");
    scheduleReconnect();
  };
  ws.onerror = () => { reconnecting = false; };
  ws.onopen = ((origOnopen) => function() {
    reconnecting = false;
    reconnectAttempts = 0;
    origOnopen.call(this);
  })(ws.onopen);
}

function handleWSMessage(msg) {
  if (msg.type === "session_start") {
    serverSessionId = msg.sessionId;
    sessionStart = msg.startTime;
    timeoutMs = msg.timeoutMs || 1800000;
    return;
  }
  if (msg.type === "reattached") {
    addSystemMessage("Reconnected.");
    // Replay buffered events from while we were disconnected
    if (msg.bufferedEvents && msg.bufferedEvents.length > 0) {
      for (const ev of msg.bufferedEvents) handleWSMessage(ev);
    }
    // Only show thinking if server confirms Claude is still running
    if (msg.claudeRunning && !waiting) {
      setWaiting(true);
    } else if (!msg.claudeRunning) {
      setWaiting(false);
    }
    return;
  }
  if (msg.type === "timeout") { addSystemMessage("Session closed — inactivity timeout."); return; }
  if (msg.type === "stopped") { setWaiting(false); addSystemMessage("Stopped."); return; }
  if (msg.type === "exit") { setWaiting(false); addSystemMessage("Session ended."); serverSessionId = null; return; }
  if (msg.type === "stderr") {
    const text = msg.text.trim();
    if (/compact/i.test(text)) {
      document.getElementById("compacting-banner").classList.add("active");
      return;
    }
    addSystemMessage(text);
    if (isAuthError(msg.text)) showReauthBanner();
    return;
  }
  if (msg.type !== "claude") return;

  const ev = msg.event;

  if (ev.type === "system" && ev.subtype === "init") {
    if (ev.session_id) {
      claudeSessionId = ev.session_id;
      localStorage.setItem("tim_claude_session", ev.session_id);
      localStorage.setItem("tim_claude_session_time", Date.now().toString());
    }
    if (!initReceived) {
      initReceived = true;
      addSystemMessage("Connected. Ready.");
    }
    return;
  }

  if (ev.type === "assistant") {
    document.getElementById("compacting-banner").classList.remove("active");
    if (!ev.message?.content) return;
    for (const block of ev.message.content) {
      if (block.type === "text" && block.text) {
        if (ev.message.id === currentMsgId && currentMsgEl) {
          currentMsgEl.querySelector(".message-content").innerHTML = renderMarkdown(block.text);
          scrollToBottom();
        } else {
          currentMsgId = ev.message.id;
          currentMsgEl = addAssistantMessage(block.text);
        }
      }
      if (block.type === "tool_use") {
        addToolIndicator(block.name, JSON.stringify(block.input || {}).slice(0, 200));
      }
    }
    if (ev.message.stop_reason) { currentMsgEl = null; currentMsgId = null; }
    return;
  }

  if (ev.type === "result") {
    document.getElementById("compacting-banner").classList.remove("active");
    setWaiting(false);
    currentMsgEl = null;
    currentMsgId = null;
    return;
  }
}

function playNotificationSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    osc.type = "sine";
    gain.gain.value = 0.3;
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
  } catch {}
}

function notifyDone() {
  if (document.hidden) {
    playNotificationSound();
    if (typeof Notification !== "undefined" && Notification.permission === "granted") {
      new Notification(displayName, { body: "Done! Tap to view.", icon: "" });
    }
  }
}

function setWaiting(on) {
  const wasBusy = waiting;
  waiting = on;
  document.getElementById("thinking").className = on ? "thinking active" : "thinking";
  document.getElementById("send-btn").style.display = on ? "none" : "flex";
  document.getElementById("stop-btn").style.display = on ? "flex" : "none";
  if (wasBusy && !on) notifyDone();
}

function stopResponse() {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: "stop" }));
  }
}

function addUserMessage(text) {
  const div = document.createElement("div");
  div.className = "message user";
  div.innerHTML = `<div class="message-label">You</div><div class="message-content">${escapeHtml(text)}</div>`;
  document.getElementById("messages").appendChild(div);
  scrollToBottom();
}

function addAssistantMessage(text) {
  const div = document.createElement("div");
  div.className = "message assistant";
  div.innerHTML = `
    <div class="message-label">${escapeHtml(displayName)}</div>
    <div class="message-content">${renderMarkdown(text)}</div>
    <button class="copy-btn" onclick="copyMessage(this)">Copy</button>
  `;
  document.getElementById("messages").appendChild(div);
  scrollToBottom();
  return div;
}

function addSystemMessage(text) {
  const div = document.createElement("div");
  div.className = "message system";
  div.textContent = text;
  document.getElementById("messages").appendChild(div);
  scrollToBottom();
}

function addToolIndicator(toolName, inputPreview) {
  const div = document.createElement("div");
  div.className = "tool-indicator";
  div.innerHTML = `<span class="tool-name">${escapeHtml(toolName)}</span> ${escapeHtml(inputPreview || "")}`;
  document.getElementById("messages").appendChild(div);
  scrollToBottom();
}

function copyMessage(btn) {
  const content = btn.parentElement.querySelector(".message-content").innerText;
  navigator.clipboard.writeText(content).then(() => {
    btn.textContent = "Copied!";
    setTimeout(() => btn.textContent = "Copy", 1500);
  });
}

function escapeHtml(text) {
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

function scrollToBottom() {
  const msgs = document.getElementById("messages");
  msgs.scrollTop = msgs.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById("message-input");
  const text = input.value.trim();
  if (!text && attachedFiles.length === 0) return;

  let content = text;
  if (attachedFiles.length > 0) {
    const fileInfo = attachedFiles.map(f => {
      if (f.serverPath) {
        const isImage = f.type && f.type.startsWith("image/");
        return `[File uploaded: ${f.serverPath}${isImage ? " (image — please read this file to see it)" : ""}]`;
      }
      return `[Attached file: ${f.name} (${f.type || 'unknown'}, ${(f.size/1024).toFixed(1)}KB)]`;
    }).join("\n");
    content = fileInfo + (text ? "\n" + text : "");
    clearFiles();
  }

  if (typeof Notification !== "undefined" && Notification.permission === "default") Notification.requestPermission();
  addUserMessage(text || "(file upload)");
  setWaiting(true);
  if (!timerInterval) { lastActivity = Date.now(); startTimer(); }

  // If WS is dead, try to reattach to detached session first
  if (!ws || ws.readyState !== 1) {
    pendingMessage = content;
    tryReattachOrReconnect();
  } else {
    ws.send(JSON.stringify({ type: "chat", content }));
  }

  input.value = "";
  autoResize(input);
}

const input = document.getElementById("message-input");

// Enter to send (Shift+Enter for newline). Works on iOS via form submit as fallback.
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
input.addEventListener("input", () => autoResize(input));

// Form submit — most reliable on iOS. Handles both send button tap and Enter key.
document.getElementById("chat-form").addEventListener("submit", (e) => {
  e.preventDefault();
  sendMessage();
});

// No touchstart preventDefault — it blocks click/submit on iOS

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 200) + "px";
}

function triggerFileUpload() {
  const fi = document.getElementById("file-input");
  fi.value = ""; // reset so same file triggers change
  fi.click();
}

// File input change handler — use addEventListener (more reliable on mobile than onchange attr)
document.getElementById("file-input").addEventListener("change", function() {
  const files = Array.from(this.files);
  if (files.length === 0) return;
  uploadFiles(files);
});

async function uploadFiles(files) {
  for (const file of files) {
    try {
      const result = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error("Failed to read file"));
        reader.readAsDataURL(file);
      });
      const base64 = result.split(",")[1];
      const res = await fetch("/api/upload", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify({ data: base64, filename: file.name, type: file.type }),
      });
      if (!res.ok) {
        addSystemMessage("Upload failed: HTTP " + res.status);
        continue;
      }
      const data = await res.json();
      if (data.path) {
        const isImage = file.type.startsWith("image/");
        attachedFiles.push({
          name: file.name, type: file.type, size: file.size,
          serverPath: data.path,
          thumbUrl: isImage ? result : null,
        });
      } else {
        addSystemMessage("Upload failed: " + (data.error || "unknown error"));
      }
    } catch (err) {
      addSystemMessage("Upload failed: " + err.message);
    }
  }
  renderFilePreview();
}

function renderFilePreview() {
  const preview = document.getElementById("file-preview");
  preview.innerHTML = "";
  if (attachedFiles.length === 0) { preview.className = "file-preview"; return; }
  preview.className = "file-preview has-files";
  attachedFiles.forEach((f, i) => {
    const chip = document.createElement("div");
    chip.className = "file-chip";
    const thumb = f.thumbUrl ? `<img class="paste-thumb" src="${f.thumbUrl}"> ` : "";
    chip.innerHTML = `${thumb}${escapeHtml(f.name)} <span class="remove" onclick="removeFile(${i})">x</span>`;
    preview.appendChild(chip);
  });
}

function removeFile(i) { attachedFiles.splice(i, 1); renderFilePreview(); }
function clearFiles() { attachedFiles = []; renderFilePreview(); document.getElementById("file-input").value = ""; }

document.addEventListener("dragover", (e) => { e.preventDefault(); document.getElementById("file-drop-zone").classList.add("active"); });
document.addEventListener("dragleave", (e) => { if (!e.relatedTarget) document.getElementById("file-drop-zone").classList.remove("active"); });
document.addEventListener("drop", (e) => { e.preventDefault(); document.getElementById("file-drop-zone").classList.remove("active"); uploadFiles(Array.from(e.dataTransfer.files)); });

// Paste handler — capture images from clipboard (screenshots)
document.addEventListener("paste", async (e) => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (!item.type.startsWith("image/")) continue;
    e.preventDefault();
    const blob = item.getAsFile();
    if (!blob) continue;
    const ext = blob.type.split("/")[1] || "png";
    const reader = new FileReader();
    reader.onload = async () => {
      const base64 = reader.result.split(",")[1];
      try {
        const res = await fetch("/api/upload", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
          body: JSON.stringify({ data: base64, filename: `screenshot.${ext}`, type: blob.type }),
        });
        const data = await res.json();
        if (data.path) {
          // Store as attached file with server path
          attachedFiles.push({ name: `screenshot.${ext}`, type: blob.type, size: blob.size, serverPath: data.path, thumbUrl: reader.result });
          renderFilePreview();
        }
      } catch (err) {
        addSystemMessage("Failed to upload screenshot.");
      }
    };
    reader.readAsDataURL(blob);
  }
});

function resetActivity() {
  lastActivity = Date.now();
}
document.addEventListener("keydown", resetActivity);
document.addEventListener("mousedown", resetActivity);

function startTimer() {
  timerInterval = setInterval(() => {
    const remaining = Math.max(0, Math.floor((timeoutMs - (Date.now() - lastActivity)) / 1000));
    const mins = Math.floor(remaining / 60).toString().padStart(2, "0");
    const secs = (remaining % 60).toString().padStart(2, "0");
    const el = document.getElementById("session-timer");
    el.textContent = `${mins}:${secs} until auto-timeout`;
    el.style.color = remaining <= 60 ? "#ef4444" : "";
  }, 1000);
}

function endSession() {
  if (!confirm("End this session?")) return;
  intentionalClose = true;
  localStorage.removeItem("tim_claude_session");
  localStorage.removeItem("tim_claude_session_time");
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: "end_session" }));
  addSystemMessage("Ending session...");
}

function showSessionPicker() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("session-picker").style.display = "flex";
  document.getElementById("chat-screen").style.display = "none";
  document.getElementById("picker-buttons").style.display = "block";
  document.getElementById("session-list-panel").style.display = "none";
}

function showResumeSessions() {
  document.getElementById("picker-buttons").style.display = "none";
  document.getElementById("session-list-panel").style.display = "block";
  loadSessionList();
}

function hideResumeSessions() {
  document.getElementById("picker-buttons").style.display = "block";
  document.getElementById("session-list-panel").style.display = "none";
}

async function loadSessionList() {
  const listEl = document.getElementById("session-list");
  const loadingEl = document.getElementById("session-list-loading");
  listEl.innerHTML = "";
  loadingEl.style.display = "block";

  try {
    const res = await fetch("/api/sessions", {
      headers: { "Authorization": "Bearer " + token }
    });
    const data = await res.json();
    loadingEl.style.display = "none";

    if (!data.sessions || data.sessions.length === 0) {
      listEl.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:12px;">No previous sessions found.</div>';
      return;
    }

    data.sessions.forEach((s, i) => {
      const btn = document.createElement("button");
      btn.className = "session-item";
      btn.dataset.sessionId = s.id;
      btn.dataset.index = i;
      const time = formatSessionTime(s.timestamp);
      const msgBadge = s.msgCount ? `<span style="color:var(--accent);font-size:11px;margin-left:6px;">${s.msgCount} msgs</span>` : "";
      btn.innerHTML = `<div class="session-summary">${escapeHtml(s.summary)}</div><div class="session-time">${escapeHtml(time)}${msgBadge}</div>`;
      btn.onclick = () => startSession(s.id);
      btn.ontouchstart = () => { highlightSession(i); };
      listEl.appendChild(btn);
    });
  } catch (e) {
    loadingEl.textContent = "Failed to load sessions.";
  }
}

function highlightSession(index) {
  const items = document.querySelectorAll(".session-item");
  items.forEach((el, i) => {
    el.classList.toggle("selected", i === index);
  });
}

function formatSessionTime(ts) {
  if (!ts || ts === "unknown") return "Unknown time";
  try {
    const d = new Date(ts);
    const now = new Date();
    const diff = now - d;
    const mins = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    const days = Math.floor(diff / 86400000);
    if (mins < 1) return "Just now";
    if (mins < 60) return `${mins}m ago`;
    if (hours < 24) return `${hours}h ago`;
    if (days < 7) return `${days}d ago`;
    return d.toLocaleDateString() + " " + d.toLocaleTimeString([], {hour: "2-digit", minute: "2-digit"});
  } catch { return ts.slice(0, 16).replace("T", " "); }
}

function startSession(sessionId) {
  resumeSessionId = sessionId;
  document.getElementById("session-picker").style.display = "none";
  document.getElementById("chat-screen").style.display = "flex";
  connectWS();
  setTimeout(() => document.getElementById("message-input").focus(), 300);
}

function showChat() {
  showSessionPicker();
}

if (token) showChat();

document.getElementById("login-pass").addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
document.getElementById("login-user").addEventListener("keydown", (e) => { if (e.key === "Enter") document.getElementById("login-pass").focus(); });

// Re-authentication
let reauthPolling = null;

function isAuthError(text) {
  const lower = text.toLowerCase();
  return lower.includes('unauthorized') || lower.includes('not authenticated') ||
    lower.includes('token expired') || lower.includes('invalid token') ||
    lower.includes('auth token') || lower.includes('please login') ||
    lower.includes('api key') || lower.includes('authentication failed') ||
    lower.includes('401') || lower.includes('oauth');
}

function showReauthBanner() {
  const banner = document.getElementById('reauth-banner');
  if (banner.classList.contains('active')) return;
  banner.classList.add('active');
  document.getElementById('reauth-content').innerHTML =
    '<strong>Authentication expired.</strong><br>' +
    '<button class="reauth-btn" onclick="startReauth()">Re-authenticate</button>';
}

async function startReauth() {
  document.getElementById('reauth-content').innerHTML =
    '<strong>Starting re-authentication...</strong>';
  try {
    const res = await fetch('/api/reauth', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    if (data.url) showReauthLink(data.url);
    if (reauthPolling) clearInterval(reauthPolling);
    reauthPolling = setInterval(pollReauthStatus, 2000);
  } catch (e) {
    document.getElementById('reauth-content').innerHTML =
      '<strong>Failed to start re-authentication.</strong><br>' +
      '<button class="reauth-btn" onclick="startReauth()">Try Again</button>';
  }
}

async function pollReauthStatus() {
  try {
    const res = await fetch('/api/reauth/status', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    if (data.url && !document.getElementById('reauth-link')) {
      showReauthLink(data.url);
    }
    if (data.status === 'success') {
      clearInterval(reauthPolling);
      reauthPolling = null;
      document.getElementById('reauth-banner').classList.remove('active');
      addSystemMessage('Re-authentication successful! You can continue chatting.');
    } else if (data.status === 'failed') {
      clearInterval(reauthPolling);
      reauthPolling = null;
      document.getElementById('reauth-content').innerHTML =
        '<strong>Re-authentication failed or timed out.</strong><br>' +
        '<button class="reauth-btn" onclick="startReauth()">Try Again</button>';
    }
  } catch {}
}

function showReauthLink(url) {
  document.getElementById('reauth-content').innerHTML =
    '<strong>Tap the link below to re-authenticate:</strong><br><br>' +
    '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener" class="reauth-link" id="reauth-link">' +
    escapeHtml(url.substring(0, 70)) + '...</a><br><br>' +
    '<small style="color:var(--text-muted)">Waiting for authorization... Come back here after approving.</small>';
}

// iOS keyboard handling: keep input area visible and pinned to bottom
if (window.visualViewport) {
  function adjustForKeyboard() {
    const chatScreen = document.getElementById("chat-screen");
    if (chatScreen.style.display !== "flex") return;
    const vvh = window.visualViewport.height;
    const vvo = window.visualViewport.offsetTop;
    chatScreen.style.height = vvh + "px";
    chatScreen.style.transform = `translateY(${vvo}px)`;
  }
  window.visualViewport.addEventListener("resize", adjustForKeyboard);
  window.visualViewport.addEventListener("scroll", adjustForKeyboard);
}

// Auto-reconnect with backoff
function scheduleReconnect() {
  if (reconnectTimer) return;
  reconnectAttempts++;
  const delay = Math.min(2000 * reconnectAttempts, 10000); // 2s, 4s, 6s... max 10s
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    if (ws && ws.readyState === 1) return;
    if (document.getElementById("chat-screen").style.display !== "flex") return;
    tryReattachOrReconnect();
  }, delay);
}

// Shared reconnection logic — checks for detached session first, falls back to resume
let reconnecting = false;
async function tryReattachOrReconnect() {
  if (reconnecting) return;
  if (ws && ws.readyState === 1) return; // already connected
  reconnecting = true;
  try {
    const res = await fetch("/api/detached", { headers: { "Authorization": "Bearer " + token } });
    const data = await res.json();
    if (data.sessions && data.sessions.length > 0) {
      const reattachId = data.sessions[0];
      addSystemMessage("Reconnecting to running session...");
      connectWS(reattachId);
      return;
    }
  } catch (e) {
    console.log("Detached check failed:", e);
    // Server might be down — retry
    reconnecting = false;
    if (reconnectAttempts < 15) scheduleReconnect();
    else addSystemMessage("Could not reconnect. Refresh the page to try again.");
    return;
  }
  // No detached session — Claude is gone. Reset UI state and reconnect fresh.
  setWaiting(false);
  resumeSessionId = claudeSessionId;

  // Fetch session history to replay missed messages
  if (claudeSessionId) {
    try {
      const histRes = await fetch(`/api/session-history/${encodeURIComponent(claudeSessionId)}`, {
        headers: { "Authorization": "Bearer " + token }
      });
      const histData = await histRes.json();
      if (histData.messages && histData.messages.length > 0) {
        // Count how many messages the UI already has
        const existingMsgs = document.querySelectorAll("#messages .message.user, #messages .message.assistant").length;
        const newMsgs = histData.messages.slice(existingMsgs);
        if (newMsgs.length > 0) {
          addSystemMessage("Replaying missed messages...");
          for (const m of newMsgs) {
            if (m.role === "user") addUserMessage(m.text);
            else if (m.role === "assistant") addAssistantMessage(m.text);
          }
        }
      }
    } catch {}
  }

  addSystemMessage("Reconnected. Send a message to continue.");
  connectWS();
}

// Auto-reconnect when page becomes visible again (e.g. switching back from another app)
document.addEventListener("visibilitychange", () => {
  if (document.hidden) return;
  if (!token) return;
  if (ws && ws.readyState === 1) return;
  if (document.getElementById("chat-screen").style.display !== "flex") return;
  tryReattachOrReconnect();
});

// Also try reconnecting on focus and pageshow (some mobile browsers don't fire visibilitychange reliably)
window.addEventListener("focus", () => {
  if (!token) return;
  if (ws && ws.readyState === 1) return;
  if (document.getElementById("chat-screen").style.display !== "flex") return;
  setTimeout(tryReattachOrReconnect, 300);
});
window.addEventListener("pageshow", (e) => {
  if (!token) return;
  if (ws && ws.readyState === 1) return;
  if (document.getElementById("chat-screen").style.display !== "flex") return;
  setTimeout(tryReattachOrReconnect, 300);
});
</script>
